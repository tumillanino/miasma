# Standard Fedora groups from the setup package that are not covered by
# any sysusers.d file. Without this, systemd-sysusers (called by
# rechunker-group-fix.service on bootc rebase) will not recreate them,
# causing systemd-tmpfiles and udevd to fail with "Unknown group" errors.

g tty    5  -
g disk   6  -
g lp     7  -
g kmem   9  -
g cdrom  11 -
g utmp   22 -
g tape   33 -
g kvm    36 -
g video  39 -
g clock  50 -
g audio  63 -
g input  -  -
g render -  -
g sgx    -  -
g tss    -  -
u tss    -  "TPM2 TSS User" /var/lib/tpm - 
